<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Rare Edge — Sports Betting Intelligence</title>
<meta name="theme-color" content="#c8f54a" />
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes menuSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes obIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes obOut{from{opacity:1}to{opacity:0;transform:translateY(-14px)}}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#080810">
    <div style="font-family:'Permanent Marker',cursive;font-size:36px;background:linear-gradient(135deg,#c8f54a,#8fdb00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px">RARE EDGE</div>
    <div style="color:#555;font-size:12px;letter-spacing:3px">LOADING...</div>
  </div>
</div>
<!-- Plain JS: config, team data, players, models, API -->
<script src="/re-config.js"></script>
<script src="/re-teams.js"></script>
<script src="/re-players.js"></script>
<script src="/re-models.js"></script>
<script src="/re-api.js"></script>
<!-- All JSX compiled together inline -->
<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef,useMemo}=React;
</script>
<script>
// Fetch all JSX files and compile together as one inline babel script
const JSX=['/re-ui.js','/re-sport-nfl.js','/re-sport-nba.js','/re-sport-mlb.js','/re-sport-nhl.js','/re-sport-soccer.js','/re-sport-other.js','/re-dashboard.js','/re-app.js'];
Promise.all(JSX.map(f=>fetch(f).then(r=>r.text())))
  .then(codes=>{
    const s=document.createElement('script');
    s.type='text/babel';
    s.setAttribute('data-presets','react');
    s.textContent=codes.join('\n');
    document.body.appendChild(s);
    Babel.transformScriptTags();
  })
  .catch(e=>{
    document.getElementById('root').innerHTML='<div style="color:#ff6b6b;padding:40px;text-align:center;font-family:sans-serif"><div style="font-size:18px;margin-bottom:10px">⚠ Error Loading App</div><div style="font-size:12px;color:#888">'+e.message+'</div></div>';
  });
</script>
</body>
</html>
